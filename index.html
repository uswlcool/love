<script>
    // --------------------------------------------------------------

        "DFOR": { name:"保守分析仪",

                  luck:"🌟 幸运版：你觉得没人配得上你，然后游戏里认识了一个。",
                  unluck:"💀 霉运版：你觉得没人配得上你，然后连人机都嫌你菜。" },
        "DFHR": { name:"内心戏仓库",
                  luck:"🌟 幸运版：你在心里演了80集，现实中对方主动找你了。",
                  unluck:"💀 霉运版：你在心里演了80集，对方已经结婚了。" },
        "DFHL": { name:"悲伤青蛙",
                  luck:"🌟 幸运版：你边哭边发‘有人爱我吗’，收到三条私信，全是骗子。",
                  unluck:"💀 霉运版：你哭的第二天，疫情封控结束，但街上没人了。" },
        "DXOR": { name:"玄学宅神",
                  luck:"🌟 幸运版：你占卜‘今日宜出门’，出门捡到一个对象。",
                  unluck:"💀 霉运版：你占卜‘今日不宜出门’，结果对象来敲了门，你没开。" },
        "DXOL": { name:"虚无主义者",
                  luck:"🌟 幸运版：爱情只是化学反应，但你遇到了让你疯狂反应的那个。",
                  unluck:"💀 霉运版：爱情只是化学反应，你的反应方程式配不平。" },
        "DXHR": { name:"中二契约者",
                  luck:"🌟 幸运版：你相信宿敌才会打开你的心扉，结果宿敌真的来了。",
                  unluck:"💀 霉运版：你的宿敌是楼下卖煎饼的大妈，她说‘加蛋吗’。" },
        "DXHL": { name:"终极摆烂王",
                  luck:"🌟 幸运版：AI都懒得分析你，因为你是天选锦鲤，躺着也能脱单。",
                  unluck:"💀 霉运版：AI分析结果：无药可救。但你不在乎，因为你在摆烂中。" }
    };

    // ----------------------------- 题库（包含荒唐选项触发暴躁）--------------------------------
    const QUESTIONS = [
        { id:1, dim:"CD", text:"发现心仪的同事也单身，你会？", 
          opts:[{txt:"直接约吃饭", val:"C", anger:false},{txt:"暗中观察，期待偶遇", val:"D", anger:false},{txt:"注册小号偷偷关注他的微博", val:"D", anger:true}] },
        { id:2, dim:"FX", text:"你认为感情长久最取决于？", 
          opts:[{txt:"三观/经济/家庭背景", val:"F", anger:false},{txt:"星座/血型/生辰八字", val:"X", anger:false},{txt:"对方会不会做酸菜鱼", val:"X", anger:true}] },
        { id:3, dim:"OH", text:"吵架后你通常会？", 
          opts:[{txt:"冷静分析对错，提出方案", val:"O", anger:false},{txt:"哭诉'你不爱我了'，拉黑", val:"H", anger:false},{txt:"发仅对方可见的朋友圈配阴天", val:"H", anger:true}] },
        { id:4, dim:"RL", text:"计划一次浪漫旅行，你会？", 
          opts:[{txt:"提前三月订票做Excel攻略", val:"R", anger:false},{txt:"周五下班说'周末去海边吧'", val:"L", anger:false},{txt:"旅行？我在家看旅游频道就好", val:"L", anger:true}] },
        { id:5, dim:"CD", text:"遇到喜欢的人第一反应？", 
          opts:[{txt:"冲上去要微信", val:"C", anger:false},{txt:"先打听情报再接近", val:"D", anger:false},{txt:"回家先算一下星座合盘", val:"D", anger:true}] },
        { id:6, dim:"FX", text:"约会地点你会选？", 
          opts:[{txt:"评分4.8以上的餐厅", val:"F", anger:false},{txt:"塔罗牌推荐的咖啡馆", val:"X", anger:false},{txt:"我家，我下面给你吃", val:"X", anger:true}] },
        { id:7, dim:"OH", text:"收到礼物不喜欢，你会？", 
          opts:[{txt:"直接说谢谢，但不用", val:"O", anger:false},{txt:"感动到哭，夸他用心", val:"H", anger:false},{txt:"发朋友圈吐槽直男审美", val:"H", anger:true}] },
        { id:8, dim:"RL", text:"周末约会安排？", 
          opts:[{txt:"提前两天确认时间地点", val:"R", anger:false},{txt:"当天随性出发", val:"L", anger:false},{txt:"宅家打游戏，说下次一定", val:"L", anger:true}] },
        // 幸运值题 (运气测量)
        { id:9, dim:"LUCK", text:"你曾经捡到过钱吗？", 
          opts:[{txt:"捡过，还给了失主", val:"luck", anger:false, luckVal:1},{txt:"捡过，自己花了", val:"none", anger:false, luckVal:0},{txt:"丢过钱，从没捡到", val:"unluck", anger:false, luckVal:-2}] },
        { id:10, dim:"LUCK", text:"抽卡/抽奖的手气？", 
          opts:[{txt:"经常出SSR", val:"luck", anger:false, luckVal:2},{txt:"一般般", val:"none", anger:false, luckVal:0},{txt:"非酋本酋", val:"unluck", anger:false, luckVal:-2}] },
        { id:11, dim:"LUCK", text:"你遇到过最离谱的约会事故？", 
          opts:[{txt:"从没遇到过", val:"luck", anger:false, luckVal:1},{txt:"对方放鸽子", val:"unluck", anger:false, luckVal:-1},{txt:"对方带着现男友来赴约", val:"unluck", anger:true, luckVal:-3}] }
    ];

    // 暴躁文案库
    const ANGER_TEXTS = [
        "🤬 你确定你是在找对象，不是在招一个全天候保姆？系统建议你下载一个‘孤寡青蛙’App。",
        "🤯 检测到你的择偶标准包含：肤白貌美/年入百万/会修电脑/热爱小动物/父母双亡——这种人只存在于你的梦里。",
        "😤 你的恋爱观像极了‘我要求对方身高180+，但我自己150还穿内增高’——系统已沉默。",
        "💢 你已经选了5次‘看缘分’，缘分说：我和你不熟。",
        "👹 你这种情况，我们一般建议——去庙里求个签，然后认命吧。",
        "💀 答题器已暴躁：你每一题都在‘随便’，那你单身也是‘随便’的结果咯！",
        "⚡ 你选的答案让AI CPU烧了，鉴定结果：无药可救，下一位～"
    ];

    // 状态管理
    let state = {
        step: 0,               // 当前第几题 (0-index)
        scores: { C:0, D:0, F:0, X:0, O:0, H:0, R:0, L:0 },
        luckScore: 0,
        angerFlag: false,     // 是否已触发暴躁
        answeredIds: [],
        questionOrder: [],     // 题目顺序（打乱但有逻辑，这里简单固定顺序）
        extraAnger: false
    };

    let currentQuestions = [...QUESTIONS];  // 可动态扩展

    // 随机打乱数组 (不影响维度平衡，简单乱序)
    function shuffle(arr) {
        for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
    }

    function initGame() {
        // 重置状态
        state = {
            step: 0,
            scores: { C:0, D:0, F:0, X:0, O:0, H:0, R:0, L:0 },
            luckScore: 0,
            angerFlag: false,
            answeredIds: [],
            questionOrder: [],
            extraAnger: false
        };
        // 题目顺序：先常规维度（前8题固定顺序方便调试，也可以乱序），幸运题放最后
        let normal = currentQuestions.filter(q => q.dim !== "LUCK");
        let luck = currentQuestions.filter(q => q.dim === "LUCK");
        state.questionOrder = [...normal, ...luck];
        renderQuestion();
    }

    function renderQuestion() {
        const container = document.getElementById("mainContent");
        if (!container) return;
        if (state.step >= state.questionOrder.length) {
            finishTest();
            return;
        }
        const q = state.questionOrder[state.step];
        const progressPercent = (state.step / state.questionOrder.length) * 100;
        let optionsHtml = "";
        q.opts.forEach((opt, idx) => {
            const prefix = String.fromCharCode(65+idx);
            optionsHtml += `<div class="option-btn" data-val="${opt.val}" data-anger="${opt.anger}" data-luckval="${opt.luckVal || 0}">
                                <span class="option-prefix">${prefix}</span>
                                <span>${opt.txt}</span>
                            </div>`;
        });
        const html = `
            <div class="question-area">
                <div class="progress"><div class="progress-bar" style="width:${progressPercent}%;"></div></div>
                <div class="badge">第${state.step+1} / ${state.questionOrder.length} 题</div>
                <div style="font-size:1.4rem; font-weight:bold; margin:15px 0;">${q.text}</div>
                <div class="options" id="optionsArea">
                    ${optionsHtml}
                </div>
            </div>
        `;
        container.innerHTML = html;
        // 绑定选项事件
        document.querySelectorAll('.option-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const val = btn.dataset.val;
                const isAnger = btn.dataset.anger === 'true';
                const luckVal = parseInt(btn.dataset.luckval) || 0;
                handleAnswer(val, isAnger, luckVal);
            });
        });
    }

    function handleAnswer(val, isAngerTrigger, luckVal) {
        // 处理维度得分
        const q = state.questionOrder[state.step];
        if (q.dim !== "LUCK") {
            // 常规维度：val 是 C/D/F/X/O/H/R/L 之一
            if (state.scores.hasOwnProperty(val)) {
                state.scores[val] += 1;
            }
        } else {
            // 幸运题
            state.luckScore += luckVal;
        }

        // 处理荒唐触发暴躁（本次选项直接暴躁）
        let showAnger = false;
        if (isAngerTrigger && !state.angerFlag) {
            showAnger = true;
            state.angerFlag = true;
        }
        // 随机暴躁（5%概率且没触发过）
        if (!state.angerFlag && !showAnger && Math.random() < 0.05) {
            showAnger = true;
            state.angerFlag = true;
        }

        state.step++;
        if (showAnger) {
            const randomAnger = ANGER_TEXTS[Math.floor(Math.random() * ANGER_TEXTS.length)];
            showAngerModal(randomAnger, () => {
                renderQuestion();
            });
        } else {
            renderQuestion();
        }
    }

    function showAngerModal(text, callback) {
        const modalDiv = document.createElement('div');
        modalDiv.className = 'anger-modal';
        modalDiv.innerHTML = `
            <div class="anger-card">
                <div style="font-size:3rem;">🤯</div>
                <div class="anger-text">${text}</div>
                <button class="btn-reset" style="background:#b32d00;" id="angerContinueBtn">继续作死</button>
            </div>
        `;
        document.body.appendChild(modalDiv);
        document.getElementById('angerContinueBtn').onclick = () => {
            modalDiv.remove();
            if (callback) callback();
        };
    }

    function finishTest() {
        // 计算基础人格类型
        let cd = state.scores.C >= state.scores.D ? 'C' : 'D';
        let fx = state.scores.F >= state.scores.X ? 'F' : 'X';
        let oh = state.scores.O >= state.scores.H ? 'O' : 'H';
        let rl = state.scores.R >= state.scores.L ? 'R' : 'L';
        let baseKey = cd+fx+oh+rl;
        const persona = PERSONA_MAP[baseKey] || PERSONA_MAP["DFHL"];
        // 根据幸运值决定幸运版还是霉运版（阈值0以上为幸运，<=0为霉运，并且如果触发了暴躁强制霉运）
        let isLuck = (state.luckScore > 0) && !state.angerFlag;
        if(state.angerFlag) isLuck = false;
        const finalJudgment = isLuck ? persona.luck : persona.unluck;
        const titleSuffix = isLuck ? "✨ 幸运版 ✨" : "☠️ 霉运版 ☠️";
        
        // 生成结果HTML
        const container = document.getElementById("mainContent");
        container.innerHTML = `
            <div class="result-area">
                <div class="badge">🎭 你的恋爱人格</div>
                <div class="personality-title">${persona.name}</div>
                <div class="judgment">${finalJudgment}</div>
                <div style="font-size:0.9rem; background:#f2e2ca; border-radius:20px; padding:8px; margin:10px 0;">
                    霉运值: ${state.luckScore} | 暴躁触发: ${state.angerFlag ? '是⚠️' : '否'}
                </div>
                <div class="guide">
                    📢 关注公众号「单身自救研究所」<br>
                    回复【脱单】领取《反PUA话术+沙雕表情包》
                </div>
                <button class="btn-reset" id="resetBtn">重新测试</button>
                <div class="share-tip">💡 点击右上角分享给朋友，看看谁是终极摆烂王</div>
            </div>
        `;
        document.getElementById('resetBtn')?.addEventListener('click', () => {
            initGame();
        });
    }

    // 启动
    initGame();
</script>
</body>
</html>
