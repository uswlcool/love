    let state = {
        step: 0,
        scores: { C:0, D:0, F:0, X:0, O:0, H:0, R:0, L:0 },
        luckScore: 0,
        angerFlag: false,
        answeredIds: [],
        questionOrder: []
    };

    function initGame() {
        state = {
            step: 0,
            scores: { C:0, D:0, F:0, X:0, O:0, H:0, R:0, L:0 },
            luckScore: 0,
            angerFlag: false,
            answeredIds: [],
            questionOrder: []
        };
        let normal = QUESTIONS.filter(q => q.dim !== "LUCK");
        let luck = QUESTIONS.filter(q => q.dim === "LUCK");
        state.questionOrder = [...normal, ...luck];
        renderQuestion();
    }

    function renderQuestion() {
        const container = document.getElementById("mainContent");
        if (!container) return;
        if (state.step >= state.questionOrder.length) {
            finishTest();
            return;
        }
        const q = state.questionOrder[state.step];
        const progressPercent = (state.step / state.questionOrder.length) * 100;
        let optionsHtml = "";
        q.opts.forEach((opt, idx) => {
            const prefix = String.fromCharCode(65+idx);
            optionsHtml += `<div class="option-btn" data-val="${opt.val}" data-anger="${opt.anger}" data-luckval="${opt.luckVal || 0}">
                                <span class="option-prefix">${prefix}</span>
                                <span>${opt.txt}</span>
                            </div>`;
        });
        const html = `
            <div class="question-area">
                <div class="progress"><div class="progress-bar" style="width:${progressPercent}%;"></div></div>
                <div class="badge">第${state.step+1} / ${state.questionOrder.length} 题</div>
                <div style="font-size:1.4rem; font-weight:bold; margin:15px 0;">${q.text}</div>
                <div class="options" id="optionsArea">
                    ${optionsHtml}
                </div>
            </div>
        `;
        container.innerHTML = html;
        document.querySelectorAll('.option-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const val = btn.dataset.val;
                const isAnger = btn.dataset.anger === 'true';
                const luckVal = parseInt(btn.dataset.luckval) || 0;
                handleAnswer(val, isAnger, luckVal);
            });
        });
    }

    function handleAnswer(val, isAngerTrigger, luckVal) {
        const q = state.questionOrder[state.step];
        if (q.dim !== "LUCK") {
            if (state.scores.hasOwnProperty(val)) {
                state.scores[val] += 1;
            }
        } else {
            state.luckScore += luckVal;
        }

        let showAnger = false;
        if (isAngerTrigger && !state.angerFlag) {
            showAnger = true;
            state.angerFlag = true;
        }
        if (!state.angerFlag && !showAnger && Math.random() < 0.05) {
            showAnger = true;
            state.angerFlag = true;
        }

        state.step++;
        if (showAnger) {
            const randomAnger = ANGER_TEXTS[Math.floor(Math.random() * ANGER_TEXTS.length)];
            showAngerModal(randomAnger, () => {
                renderQuestion();
            });
        } else {
            renderQuestion();
        }
    }

    function showAngerModal(text, callback) {
        const modalDiv = document.createElement('div');
        modalDiv.className = 'anger-modal';
        modalDiv.innerHTML = `
            <div class="anger-card">
                <div style="font-size:3rem;">🤯</div>
                <div class="anger-text">${text}</div>
                <button class="btn-reset" style="background:#b32d00;" id="angerContinueBtn">继续作死</button>
            </div>
        `;
        document.body.appendChild(modalDiv);
        document.getElementById('angerContinueBtn').onclick = () => {
            modalDiv.remove();
            if (callback) callback();
        };
    }

    let currentResult = { personaKey: null, persona: null, isLuck: false, finalJudgment: "", titleSuffix: "", code: "" };

    function finishTest() {
        let cd = state.scores.C >= state.scores.D ? 'C' : 'D';
        let fx = state.scores.F >= state.scores.X ? 'F' : 'X';
        let oh = state.scores.O >= state.scores.H ? 'O' : 'H';
        let rl = state.scores.R >= state.scores.L ? 'R' : 'L';
        let baseKey = cd+fx+oh+rl;
        const persona = PERSONA_MAP[baseKey] || PERSONA_MAP["DFHL"];
        let isLuck = (state.luckScore > 0) && !state.angerFlag;
        if(state.angerFlag) isLuck = false;
        const finalJudgment = isLuck ? persona.luck : persona.unluck;
        const titleSuffix = isLuck ? "✨ 幸运版 ✨" : "☠️ 霉运版 ☠️";
        
        currentResult = { personaKey: baseKey, persona, isLuck, finalJudgment, titleSuffix, code: persona.code };

        const container = document.getElementById("mainContent");
        container.innerHTML = `
            <div class="result-area" id="captureArea">
                <div class="badge">🎭 你的恋爱人格</div>
                <div class="code-badge">📟 代码：${persona.code}</div>
                <div class="personality-title">${persona.name} ${titleSuffix}</div>
                <div class="judgment">${finalJudgment}</div>
                <div style="font-size:0.9rem; background:#f2e2ca; border-radius:20px; padding:8px; margin:10px 0;">
                    霉运值: ${state.luckScore} | 暴躁触发: ${state.angerFlag ? '是⚠️' : '否'}
                </div>
                <div class="guide">
                    📢 关注公众号「胡咧咧大王」<br>
                    回复【脱单】领取《脱单秘笈-终极版》
                </div>
            </div>
            <div style="margin-top: 20px;">
                <button class="btn-share" id="shareBtn">📸 生成分享图片</button>
                <button class="btn-reset" id="resetBtn">重新测试</button>
            </div>
            <div class="share-tip">💡 点击右上角分享给朋友，看看谁是终极摆烂王</div>
        `;
        document.getElementById('resetBtn')?.addEventListener('click', () => {
            initGame();
        });
        document.getElementById('shareBtn')?.addEventListener('click', () => {
            generateShareImage();
        });
    }

    async function generateShareImage() {
        const element = document.getElementById('captureArea');
        if (!element) return;
        const btn = document.getElementById('shareBtn');
        const originalText = btn.innerText;
        btn.innerText = '生成中...';
        btn.disabled = true;
        try {
            const canvas = await html2canvas(element, {
                scale: 2,
                backgroundColor: '#fff6e8',
                logging: false,
                useCORS: false
            });
            const imageData = canvas.toDataURL('image/png');
            showImagePreview(imageData);
        } catch (err) {
            alert('生成失败，请重试');
            console.error(err);
        } finally {
            btn.innerText = originalText;
            btn.disabled = false;
        }
    }

    function showImagePreview(imageData) {
        const modal = document.createElement('div');
        modal.className = 'image-preview-modal';
        modal.innerHTML = `
            <div class="close-preview">✕</div>
            <img src="${imageData}" class="preview-image" alt="分享图片" />
            <div class="preview-actions">
                <button id="saveImageBtn">保存图片</button>
                <button id="closePreviewBtn">关闭</button>
            </div>
            <div style="color:white; margin-top:15px; font-size:14px;">💡 长按图片保存到相册，分享朋友圈</div>
        `;
        document.body.appendChild(modal);
        const closeModal = () => modal.remove();
        modal.querySelector('.close-preview').addEventListener('click', closeModal);
        modal.querySelector('#closePreviewBtn').addEventListener('click', closeModal);
        modal.querySelector('#saveImageBtn').addEventListener('click', () => {
            const link = document.createElement('a');
            link.download = 'singleton_result.png';
            link.href = imageData;
            link.click();
        });
    }

    initGame();
</script>
</body>
</html>
